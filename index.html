<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <title>Expense Tracker</title>
    <style>
        .card { width: 300px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; }
        input { width: 100%; margin-bottom: 10px; padding: 8px; }
        button { width: 100%; padding: 10px; background-color: green; color: white; border: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Cost calculation</h2>
    <input type="text" id="title" placeholder="what is cost?">
    <input type="number" id="amount" placeholder="cost(₹)">
    <button onclick="addExpense()">Add</button>
    
    <ul id="expenseList"></ul>
</div>

<script>
    const API_URL = 'http://localhost:8082/api/expenses';

    
    function fetchExpenses() {
        fetch(API_URL)
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('expenseList');
                list.innerHTML = '';
                data.forEach(ex => {
                   
                    list.innerHTML += `<li>${ex.title} - ₹${ex.amount}</li>`;
                });
            });
    }

    
    function addExpense() {
        const titleVal = document.getElementById('title').value;
        const amountVal = document.getElementById('amount').value;

        fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: titleVal, amount: amountVal })
        }).then(() => {
            document.getElementById('title').value = '';
            document.getElementById('amount').value = '';
            fetchExpenses();
        });
    }

    fetchExpenses();
</script>

</body>
</html>
